services:
  eshopdb:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: eshop
      POSTGRES_PASSWORD: eshoppassword
      POSTGRES_DB: eshopdb
    ports:
      # Host:Container - changed host port to 5433 because 5432 is already used on the host
      - "5433:5432"
    volumes:
      - postgres_eshopdb:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eshop"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_eshopdb:
    name: postgres_eshopdb
